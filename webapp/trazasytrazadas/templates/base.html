<!doctype html>
<html lang="es">
<head>

  <title>{% block title %}Trazas de Herbívoros{% endblock %}</title>

</head>
<body class="min-h-screen bg-[#f5f5f5] text-[#222]">
  <header class="bg-[#283593] text-white py-4 px-4">

      Trazas de Herbívoros
